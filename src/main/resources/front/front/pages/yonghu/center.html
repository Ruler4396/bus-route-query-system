
<!-- 个人中心 -->
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>个人中心</title>
		<link rel="stylesheet" href="../../layui/css/layui.css">
		<!-- 样式 -->
		<link rel="stylesheet" href="../../css/style.css" />
		<!-- 主题（主要颜色设置） -->
		<link rel="stylesheet" href="../../css/theme.css" />
		<!-- 通用的css -->
		<link rel="stylesheet" href="../../css/common.css" />
	
		<link rel="stylesheet" href="../../css/transit-business-ui.css">

		<link rel="stylesheet" href="../../css/accessibility-sr-only.css">

		<link rel="stylesheet" href="../../css/accessibility-high-contrast.css">
</head>
	<style>
		#swiper {
			display: none;
		}
	</style>
	<body class="transit-ui transit-page page-user-center page-account-area">

		<div id="app">
			<div class="layui-carousel" id="swiper" aria-hidden="true">
			  <div carousel-item id="swiper-item">
				<div v-for="(item,index) in swiperList" :key="index">
					<img style="width: 100%;height: 100%;object-fit:cover;" :src="item.img" />
				</div>
			  </div>
			</div>

			<section class="account-page-header">
				<div class="account-page-header-main">
					<span class="account-page-eyebrow">USER / CENTER</span>
					<h1>个人中心</h1>
					<p>统一管理个人资料、头像与登录态相关操作，界面风格与全站无障碍卡片体系保持一致。</p>
				</div>
				<div class="account-page-header-note">
					<span>当前模块</span>
					<strong>个人资料维护</strong>
				</div>
			</section>

			<section class="center-container account-shell">
				<aside class="left-container account-sidebar">
					<div class="account-sidebar-intro">
						<p class="account-sidebar-kicker">PERSONAL HUB</p>
						<h2>个人服务</h2>
						<p>快速切换个人资料与收藏记录，避免出现模板式双层边框与拥挤布局。</p>
					</div>
					<ul class="layui-nav layui-nav-tree account-menu" role="navigation" aria-label="个人服务菜单">
						<li v-for="(item,index) in centerMenu" v-bind:key="index" class="layui-nav-item" :class="isActiveCenterMenu(item.url) ? 'layui-this' : ''">
							<a :href="'javascript:jump(\''+item.url+'\')'">{{item.name}}</a>
						</li>
					</ul>
				</aside>

				<div class="right-container account-panel">
					<div class="account-panel-head account-panel-head--profile">
						<div>
							<p class="account-panel-kicker">PROFILE SETTINGS</p>
							<h2>个人资料</h2>
							<p>修改账号、密码、姓名、年龄、性别、手机与头像，保存后立即同步到当前账号。</p>
						</div>
						<div class="account-panel-chip-group">
							<span class="account-panel-chip">统一账号信息</span>
							<span class="account-panel-chip">即时保存</span>
						</div>
					</div>

					<form class="layui-form account-form" lay-filter="myForm">
						<input type="hidden" name="id" id="id" />
						<div class="account-form-grid">
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="zhanghao">账号</label>
								<div class="layui-input-block input">
									<input type="text" readonly="readonly" name="zhanghao" id="zhanghao" placeholder="账号" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="mima">密码</label>
								<div class="layui-input-block input">
									<input type="password" name="mima" id="mima" placeholder="密码" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="xingming">姓名</label>
								<div class="layui-input-block input">
									<input type="text" name="xingming" id="xingming" placeholder="姓名" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="nianling">年龄</label>
								<div class="layui-input-block input">
									<input type="text" name="nianling" id="nianling" placeholder="年龄" inputmode="numeric" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="xingbie">性别</label>
								<div class="layui-input-block select">
									<select name="xingbie" id="xingbie">
										<option value="">请选择</option>
										<option v-for="(item,index) in xingbie" v-bind:key="index" :value="item">{{item}}</option>
									</select>
								</div>
							</div>
							<div class="layui-form-item account-form-item">
								<label class="layui-form-label account-form-label" for="shouji">手机</label>
								<div class="layui-input-block input">
									<input type="text" name="shouji" id="shouji" placeholder="手机" inputmode="tel" autocomplete="off" class="layui-input">
								</div>
							</div>
							<div class="layui-form-item account-form-item account-form-item--avatar">
								<label class="layui-form-label account-form-label">头像预览</label>
								<div class="layui-input-block">
									<div class="account-avatar-row">
										<img id="zhaopianImg" class="account-avatar-preview" src="../../img/avator.png" alt="当前头像预览" width="96" height="96" decoding="async">
										<div class="account-avatar-copy">
											<strong>个人头像</strong>
											<span>上传新头像后会同步替换当前资料展示图片。</span>
										</div>
									</div>
									<input type="hidden" id="zhaopian" name="zhaopian" />
								</div>
							</div>
							<div class="layui-form-item account-form-item account-form-item--upload">
								<label class="layui-form-label account-form-label">上传新头像</label>
								<div class="layui-input-block">
									<button type="button" class="layui-btn btn-theme account-upload-btn" id="zhaopianUpload">
										<i class="layui-icon">&#xe67c;</i>上传图片
									</button>
								</div>
							</div>
							<div class="layui-form-item account-form-item account-form-item--actions">
								<div class="layui-input-block account-actions">
									<button class="layui-btn btn-submit btn-theme account-primary-btn" lay-submit lay-filter="*">保存信息</button>
									<button type="button" @click="logout" class="layui-btn btn-submit account-secondary-btn">退出登录</button>
								</div>
							</div>
						</div>
					</form>
				</div>
			</section>
		</div>

		<!-- layui -->
		<script src="../../layui/layui.js"></script>
		<!-- vue -->
		<script src="../../js/vue.js"></script>
		<!-- 组件配置信息 -->
		<script src="../../js/config.js"></script>
		<!-- 扩展插件配置信息 -->
		<script src="../../modules/config.js"></script>
		<!-- 工具方法 -->
		<script src="../../js/utils.js"></script>
		<!-- 校验格式工具类 -->
		<script src="../../js/validate.js"></script>

		<script>
			var vue = new Vue({
				el: '#app',
				data: {
					// 轮播图
					swiperList: [],
					xingbie: [],
					centerMenu: centerMenu
				},
                updated: function() {
					layui.form.render(null, 'myForm');
				},
				methods: {
					jump(url) {
						jump(url)
					},
					isActiveCenterMenu(url) {
						var normalized = (url || '').replace('../', '/');
						return window.location.pathname.indexOf(normalized) !== -1;
					},
					logout(){
						localStorage.removeItem('Token');
						localStorage.removeItem('role');
						localStorage.removeItem('sessionTable');
						localStorage.removeItem('adminName');
						localStorage.removeItem('userid');
						localStorage.removeItem('vip');
						localStorage.removeItem('userTable');
						localStorage.removeItem('iframeUrl');
						window.parent.location.href = '../login/login.html';
					}
				}
			})

			layui.use(['layer', 'element', 'carousel', 'http', 'jquery', 'form', 'upload', 'laydate'], function() {
				var layer = layui.layer;
				var element = layui.element;
				var carousel = layui.carousel;
				var http = layui.http;
				var jquery = layui.jquery;
				var form = layui.form;
				var upload = layui.upload;
				var laydate = layui.laydate;
				vue.baseurl = http.baseurl;
				// 获取轮播图 数据
				http.request('config/list', 'get', {
					page: 1,
					limit: 5
				}, function(res) {
					if (res.data.list.length > 0) {
						var swiperItemHtml = '';
						for (let item of res.data.list) {
							if (item.name.indexOf('picture') >= 0 && item.value && item.value != "" && item.value != null) {
								swiperItemHtml +=
									'<div>' +
									'<img style="width: 100%;height: 100%;object-fit:cover;" class="swiper-item" src="' + http.baseurl+item.value + '">' +
									'</div>';
							}
						}
						jquery('#swiper-item').html(swiperItemHtml);
						// 轮播图
						vue.$nextTick(() => {
						  carousel.render({
						  	elem: '#swiper',
							width: '100%',
						  	height: '550px',
						  	arrow: 'hover',
						  	anim: 'default',
						  	autoplay: 'true',
						  	interval: '3000',
						  	indicator: 'inside'
						  });

						})
						// carousel.render({
						// 	elem: '#swiper',
						// 	width: swiper.width,height:swiper.height,
						// 	arrow: swiper.arrow,
						// 	anim: swiper.anim,
						// 	interval: swiper.interval,
						// 	indicator: "none"
						// });
					}
				});

				vue.xingbie = '男,女'.split(',')
				// 上传图片
				var zhaopianUpload = upload.render({
					//绑定元素
					elem: '#zhaopianUpload',
					//上传接口
					url: http.baseurl + 'file/upload',
					// 请求头
					headers: {
						Token: localStorage.getItem('Token')
					},
					// 允许上传时校验的文件类型
					accept: 'images',
					before: function() {
						//loading层
						var index = layer.load(1, {
							shade: [0.1, '#fff'] //0.1透明度的白色背景
						});
					},
					// 上传成功
					done: function(res) {
						console.log(res);
						layer.closeAll();
						if (res.code == 0) {
							layer.msg("上传成功", {
								time: 2000,
								icon: 6
							})
							var url = 'upload/' + res.file;
							jquery('#zhaopian').val(url);
							jquery('#zhaopianImg').attr('src', http.baseurl+url)
						} else {
							layer.msg(res.msg, {
								time: 2000,
								icon: 5
							})
						}
					},
					//请求异常回调
					error: function() {
						layer.closeAll();
						layer.msg("请求接口异常", {
							time: 2000,
							icon: 5
						})
					}
				});

				// 查询用户信息
				let table = localStorage.getItem("userTable");

				if(!table){
					layer.msg('请先登录', {
						time: 2000,
						icon: 5
					}, function() {
						window.parent.location.href = '../login/login.html';
					});
				}


				http.request(`${table}/session`, 'get', {}, function(data) {
					// 表单赋值
					form.val("myForm", data.data);
					// 图片赋值
					jquery("#zhaopianImg").attr("src", http.baseurl+data.data.zhaopian);
				});

				// 提交表单
				form.on('submit(*)', function(data) {
					data = data.field;
					if(!data.zhanghao){
						layer.msg('账号不能为空', {
														time: 2000,
														icon: 5
												});
						return false
					}
					if(!data.mima){
						layer.msg('密码不能为空', {
														time: 2000,
														icon: 5
												});
						return false
					}
					if(!data.xingming){
						layer.msg('姓名不能为空', {
														time: 2000,
														icon: 5
												});
						return false
					}
					if(!isIntNumer(data.nianling)){
						layer.msg('年龄应输入整数', {
														time: 2000,
														icon: 5
												});
						return false
					}
					if(!isMobile(data.shouji)){
						layer.msg('手机应输入手机格式', {
														time: 2000,
														icon: 5
												});
						return false
					}
					http.requestJson(table + '/update', 'post', data, function(res) {
						layer.msg('修改成功', {
							time: 2000,
							icon: 6
						}, function() {
							window.location.reload();
						});
					});
					return false
				});

			});
		</script>
	
		<script src="../../js/accessibility.js"></script>
</body>
</html>
